<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Clipboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .archive-item:hover .item-actions { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
            <div>
                <h1 class="text-xl font-bold text-slate-800">Clipboard Sync</h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="connection-dot" class="w-2 h-2 rounded-full bg-slate-300 transition-colors duration-300"></div>
                    <span id="connection-text" class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Verbinde...</span>
                </div>
            </div>
            <span id="char-count" class="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded">0 Zeichen</span>
        </div>

        <div class="p-6">
            <textarea 
                id="clipboard-input" 
                class="w-full h-64 p-4 text-slate-700 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none transition-all placeholder:text-slate-400"
                placeholder="Text hier einfügen..."></textarea>
            
            <div class="grid grid-cols-3 gap-3 mt-6">
                <button id="copy-btn" class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-4 rounded-xl transition-all active:scale-95 text-sm">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    Kopieren
                </button>
                <button id="save-btn" class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-4 rounded-xl transition-all active:scale-95 text-sm">
                    <i data-lucide="send" class="w-4 h-4"></i>
                    Senden
                </button>
                <button id="clear-btn-main" class="flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-xl transition-all active:scale-95 text-sm">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    Leeren
                </button>
            </div>
        </div>

        <div class="border-t border-slate-100 bg-slate-50/50 p-6">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                <i data-lucide="history" class="w-4 h-4"></i>
                Archiv
            </h2>
            <div id="archive-list" class="space-y-2">
                <p id="archive-empty" class="text-center text-slate-400 text-xs py-4 italic">Noch keine kopierten Texte vorhanden</p>
            </div>
        </div>

        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-full text-sm font-medium shadow-lg opacity-0 transition-all duration-300 pointer-events-none z-50">
            Aktion ausgeführt!
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeBP2kuPaq_5NVpCpJMsfeZMwwBhX3s3c",
            authDomain: "clipboard-e5682.firebaseapp.com",
            databaseURL: "https://clipboard-e5682-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "clipboard-e5682",
            storageBucket: "clipboard-e5682.firebasestorage.app",
            messagingSenderId: "503892664145",
            appId: "1:503892664145:web:215037be708b7d94f6f3a3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const clipboardRef = ref(db, 'shared_clipboard');

        const input = document.getElementById('clipboard-input');
        const saveBtn = document.getElementById('save-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn-main');
        const archiveList = document.getElementById('archive-list');
        const archiveEmpty = document.getElementById('archive-empty');
        const connectionDot = document.getElementById('connection-dot');
        const connectionText = document.getElementById('connection-text');
        const charCount = document.getElementById('char-count');
        const toast = document.getElementById('toast');

        let lastSyncedValue = "";

        const updateUIState = () => {
            charCount.innerText = `${input.value.length} Zeichen`;
            if (input.value !== lastSyncedValue) {
                saveBtn.classList.replace('bg-slate-800', 'bg-blue-600');
                saveBtn.classList.replace('hover:bg-slate-900', 'hover:bg-blue-700');
            } else {
                saveBtn.classList.replace('bg-blue-600', 'bg-slate-800');
                saveBtn.classList.replace('hover:bg-blue-700', 'hover:bg-slate-900');
            }
        };

        // Archiv-Funktion
        function addToArchive(text) {
            if (!text.trim()) return;
            archiveEmpty.classList.add('hidden');
            
            const div = document.createElement('div');
            div.className = "archive-item flex items-center justify-between gap-4 p-3 bg-white border border-slate-200 rounded-lg group hover:border-blue-200 transition-all";
            
            div.innerHTML = `
                <span class="text-sm text-slate-600 truncate flex-1 font-mono">${text}</span>
                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="copy-small p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="Erneut kopieren">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <button class="delete-small p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors" title="Entfernen">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            `;

            // Buttons im Archiv funktionsfähig machen
            div.querySelector('.copy-small').addEventListener('click', () => {
                navigator.clipboard.writeText(text);
                showToast("Erneut kopiert!");
            });

            div.querySelector('.delete-small').addEventListener('click', () => {
                div.remove();
                if (archiveList.children.length <= 1) archiveEmpty.classList.remove('hidden');
            });

            archiveList.prepend(div);
            lucide.createIcons();
        }

        onValue(clipboardRef, (snapshot) => {
            const data = snapshot.val();
            if (data !== null) {
                if (document.activeElement !== input) input.value = data;
                lastSyncedValue = data;
                updateUIState();
            }
            connectionDot.className = "w-2 h-2 rounded-full bg-green-500";
            connectionText.innerText = "Synchronisiert";
            connectionText.className = "text-xs text-green-600 uppercase tracking-wider font-semibold";
        });

        input.addEventListener('input', updateUIState);

        saveBtn.addEventListener('click', () => {
            set(clipboardRef, input.value).then(() => {
                lastSyncedValue = input.value;
                updateUIState();
                showToast("In Cloud gespeichert!");
            });
        });

        copyBtn.addEventListener('click', async () => {
            if (!input.value) return;
            try {
                const textToCopy = input.value;
                await navigator.clipboard.writeText(textToCopy);
                addToArchive(textToCopy); // Ins Archiv schieben
                input.value = "";          // Eingabefeld leeren
                updateUIState();
                showToast("Kopiert & Archiviert");
            } catch (err) {
                showToast("Fehler beim Kopieren");
            }
        });

        clearBtn.addEventListener('click', () => {
            input.value = "";
            updateUIState();
            input.focus();
            showToast("Eingabe geleert");
        });

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
